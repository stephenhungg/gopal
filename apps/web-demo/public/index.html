<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gopal Live</title>
    <link rel="stylesheet" href="/styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "/node_modules/three/build/three.module.js",
          "three/addons/": "/node_modules/three/examples/jsm/",
          "@pixiv/three-vrm": "/node_modules/@pixiv/three-vrm/lib/three-vrm.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main class="shell">
      <section class="stage" aria-label="Gopal realtime demo">
        <video id="camera" autoplay muted playsinline></video>
        <canvas id="snapshot" width="640" height="360" aria-hidden="true"></canvas>

        <div id="status" class="status">offline</div>

        <canvas id="vrmStage" class="vrm-stage" aria-label="Gopal VRM avatar"></canvas>

        <div id="gopal" class="gopal idle" aria-live="polite">
          <div class="thought-box">
            <div class="thought-horn left"></div>
            <div class="thought-horn right"></div>
            <div class="thought-meta">
              <strong>Gopal</strong>
              <span id="mood">idle</span>
            </div>
            <div id="caption" class="thought-text">waiting for the ritual</div>
          </div>
        </div>

        <aside class="panel">
          <button id="start">wake gopal</button>
          <button id="stop" disabled>banish</button>
          <button id="lookNow" disabled>look now</button>
          <label class="select">
            <span>voice</span>
            <select id="voice">
              <option value="cedar" selected>cedar</option>
              <option value="marin">marin</option>
              <option value="verse">verse</option>
              <option value="ballad">ballad</option>
              <option value="coral">coral</option>
              <option value="ash">ash</option>
              <option value="sage">sage</option>
              <option value="echo">echo</option>
              <option value="shimmer">shimmer</option>
              <option value="alloy">alloy</option>
            </select>
          </label>
          <label class="toggle">
            <input id="autoLook" type="checkbox" checked />
            <span>vision</span>
          </label>
          <label class="toggle">
            <input id="ambientTalk" type="checkbox" checked />
            <span>ambient talk</span>
          </label>
          <label class="range">
            <span>vision pulse</span>
            <input id="frameRate" type="range" min="2" max="10" value="4" />
          </label>
        </aside>

        <ol id="log" class="log" aria-label="event log"></ol>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
